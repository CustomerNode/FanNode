# /etc/fannode.conf
# FanNode configuration. Reload after edits with:  sudo systemctl restart fannode
# Lines starting with # are comments. Format is plain shell key=value.

# ---------- Polling ----------

# Seconds between control loop iterations. The Dell BIOS reclaims PWM control
# after a few minutes if not re-asserted, so values above ~10 risk losing the
# tug-of-war. Default 3 is a good balance of responsiveness and CPU cost.
INTERVAL=3

# ---------- Managed fans ----------
# Which fans should FanNode drive. Each name maps to PWM/tach files via
# FAN_PWM_FILE / FAN_TACH_FILE (defaults below for Dell SMM).
#
# Default (when unset): cpu motherboard
#   - cpu          : pwm1 / fan1_input  (Processor Fan)
#   - motherboard  : pwm2 / fan2_input  (chassis exhaust on Studio XPS 9100)
#   - psu          : pwm3 / fan3_input  (PSU fan; usually self-controlled —
#                                         opt in only if you know what you're doing)
#
# Keep order meaningful: the FIRST entry is treated as the "primary" fan and
# its readings populate the legacy top-level fields in /run/fannode/status.json
# (fan_rpm, pwm, pwm_readback, bios_reclaim_count) — used by the Cinnamon
# applet and pre-0.2 consumers.
#
#MANAGED_FANS=(cpu motherboard)

# ---------- Hardware paths ----------
# Auto-discovered from /sys/class/hwmon (look for the "dell_smm" hwmon and use
# its pwmN/fanN_input files). Override here only if discovery picks the wrong
# hwmon or you want to pin specific paths.
#
#FAN_PWM_FILE[cpu]=/sys/class/hwmon/hwmon0/pwm1
#FAN_TACH_FILE[cpu]=/sys/class/hwmon/hwmon0/fan1_input
#FAN_PWM_FILE[motherboard]=/sys/class/hwmon/hwmon0/pwm2
#FAN_TACH_FILE[motherboard]=/sys/class/hwmon/hwmon0/fan2_input
#
# Backward-compat: pre-0.2 single-fan setups can still set PWM_FILE / TACH_FILE
# (no array). They are treated as overrides for the cpu fan only.
#PWM_FILE=/sys/class/hwmon/hwmon0/pwm1
#TACH_FILE=/sys/class/hwmon/hwmon0/fan1_input

# ---------- Fan curve ----------
# Each zone has an upper temperature bound and a target PWM (0–255). The same
# curve is applied to every managed fan; the temperature input is the hottest
# core. Hysteresis (below) prevents oscillation at zone boundaries.
#
# This curve is a near-step-function and is shaped to sidestep a BIOS quirk
# observed on the Studio XPS 9100: PWM writes between ~129 and ~250 are
# silently clamped to 128 (~50%) by the BIOS until temps cross the BIOS's
# own threshold. Mid-range PWM values are therefore worse than useless —
# they look like "ramping" but the fan stays at idle RPM.
#
# Strategy: at idle, ask low (BIOS clamps up to 128, ~2100 RPM, quiet).
# Above 65°C we jump straight to 255 so the BIOS has nothing to clamp.
#
#         max_temp   PWM    fan RPM (observed, cpu fan)
#   normal   65°C     80    ~2100 (BIOS clamps to 128)
#   warm     80°C    255    ~3570 (full)
#   hot      90°C    255    ~3570
#   crit     ---     255    ~3570 + health=thermal_overrun

CURVE_NORMAL_MAX_TEMP=65
CURVE_NORMAL_PWM=80

CURVE_WARM_MAX_TEMP=80
CURVE_WARM_PWM=255

CURVE_HOT_MAX_TEMP=90
CURVE_HOT_PWM=255

CURVE_CRITICAL_PWM=255

# Temperature must drop this many °C below a zone boundary before the daemon
# steps the fan down. 3 is conservative and quiet; 1 is twitchy.
HYSTERESIS_DROP=3

# ---------- Health thresholds ----------

# Cores at or above this and PWM already at max -> health=thermal_overrun
# (cooling cannot keep up). Triggers a critical-notify popup.
CRITICAL_TEMP=95

# Cores in the hot zone for this many consecutive seconds -> health=sustained_hot
SUSTAINED_HOT_SECS=120
